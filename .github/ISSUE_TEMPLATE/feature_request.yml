name: Feature Request
description: Suggest an idea for this project
title: "[Feat] "
labels: ["type: feat", "priority: low"]
assignees: []

body:
  - type: textarea
    id: summary
    attributes:
      label: 요약
      description: 기능에 대한 명확하고 간결한 설명을 작성해 주세요.
      placeholder: 어떤 기능을 원하시나요?
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: 동기
      description: 이 기능이 왜 필요한가요? 어떤 문제를 해결하나요?
      placeholder: 현재 어떤 불편함이 있는지 설명해 주세요.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 제안하는 해결 방법
      description: 어떤 방식으로 동작하면 좋을지 설명해 주세요.
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 우선순위
      description: 이 기능의 중요도를 선택해 주세요.
      options:
        - 낮음 - 있으면 좋은 기능
        - 보통 - 유용한 기능
        - 높음 - 꼭 필요한 기능
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 고려한 대안
      description: 고려해 본 다른 해결 방법이나 기능이 있다면 작성해 주세요.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 추가 정보
      description: 목업, 참고 자료, 스크린샷 등을 첨부해 주세요.
    validations:
      required: false
