services:
  kafka:
    image: apache/kafka:4.3.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft mode configuration
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093

      # Kafka Cluster ID loaded dynamically from .env file
      CLUSTER_ID: "ec7CyMGKTGaa_wCphnMYGQ"

      # Single-node configuration tweaks for quick testing
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: "local-kraft-cluster"
      # Connected directly using the internal Docker listener
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:29092"

  redis:
    image: redis:7.2-alpine
    container_name: redis
    ports:
      - "6379:6379"

  jobmanager:
    build:
      context: .
      dockerfile: flink.Dockerfile
    container_name: jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8081/v1/overview > /dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  taskmanager:
    build:
      context: .
      dockerfile: flink.Dockerfile
    container_name: taskmanager
    depends_on:
      - jobmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2

  flink-sql-client:
    build:
      context: .
      dockerfile: flink.Dockerfile
    container_name: flink-sql-client
    depends_on:
      kafka:
        condition: service_started
      redis:
        condition: service_started
      jobmanager:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        echo 'JobManager is ready. Submitting SQL job...'
        sql-client.sh -f /opt/flink/workspace/flink-job.sql
        tail -f /dev/null
    volumes:
      - .:/opt/flink/workspace
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        rest.address: jobmanager
